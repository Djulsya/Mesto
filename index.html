<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mesto">
  <meta name="keywords" content=" ">
  <meta name="author" content="Юлия Бондаренко">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js"></script>
  <title>Сервис Место</title>
</head>

<body class="page">
  <header class="header">
    <img class="header__logo" src="./images/header__logo.svg" alt="логотип сервиса место">
    <img class="header__borderline" src="./images/line.jpg">
  </header>
  <main class="content">

    <section class="profile">
      <div class="profile__content">
        <img class="profile__avatar" src="./images/avatar.jpg" alt="изображение аватара пользователя">

        <div class="profile__info">
          <div class="profile__title">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button class="profile__editbutton">
              <img class="profile__editbutton" src="./images/editbutton.svg"
                alt="кнопка редактирования личной информации профиля">
            </button>
          </div>
          <p class="profile__about">Исследователь океана</p>
        </div>
      </div>

      <button class="profile__addbutton-img profile__addbutton">
        <!-- <img class="profile__addbutton-img" src="./images/addbutton-1.svg"
          alt="кнопка добавления нового контента в аккаунт"> -->
      </button>
    </section>

    <section class="elements">
      <article class="element">
        <img class="element__photo" src="./images/1. Royal-Botanical-Gardens-of-Peradeniya_Kandy_Sri-Lanka-2-min.jpg">
        <div class="element__content">
          <p class="element__text">Sri-Lanka, alocasia</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/2. United-Kingdom-min.jpg">
        <div class="element__content">
          <p class="element__text">UK, papaver</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/3. Denver_United-States.jpg">
        <div class="element__content">
          <p class="element__text">Denver, nymphaea</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/4. New-Forest-National-Park_UK.jpg">
        <div class="element__content">
          <p class="element__text">New-Forest, nephrolepis and horse</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/5. Santa-Maria.jpg">
        <div class="element__content">
          <p class="element__text">Campania, caladium</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/6. Cairns-Botanic-Gardens_Cairns_Australia-min.jpg">
        <div class="element__content">
          <p class="element__text">Cairns, begonia</p>
          <button class="element__button">
            <img class="element__like" src="./images/like.svg">
          </button>
        </div>
      </article>
    </section>
  </main>
  <footer class="footer">
    <h2 class="footer__copyright">&copy; 2022 Mesto Russia</h2>
  </footer>
</body>


<div class="popup__closebutton"><img src="./images/closeicon.svg"></div>

<container class="popup">

  <form class="popup__editprofile">

    <h2 class="popup__title">Редактировать профиль</h2>
    <label class="popup__form">
      <input class="popup__editform" type="text" name="name">
    </label>
    <img src="./images/popupeditprofileformline.svg">
    <label class="popup__form">
      <input class="popup__editform" type="text" name="about" placeholder="Исследователь океана">
    </label>
    <img src="./images/popupeditprofileformline.svg">
    <button class="popup__savebutton" type="submit">Сохранить</button>

  </form>

</container>

</html>
