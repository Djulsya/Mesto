<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mesto">
  <meta name="keywords" content="интерактивный альбом, выложить фото, оценить фото, путешествия">
  <meta name="author" content="Юлия Бондаренко">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Сервис Место</title>
</head>

<body class="page">
  <header class="header">
    <img class="header__logo" src="./images/headerlogo.svg" alt="логотип сервиса место">
  </header>
  <main class="content">
    <section class="profile">
      <div class="profile__content">
        <img class="profile__avatar" src="./images/avatar.jpg" alt="изображение аватара пользователя">
        <div class="profile__info">
          <div class="profile__title">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button class="profile__editbutton link" type="button">
            </button>
          </div>
          <p class="profile__about">Исследователь океана</p>
        </div>
      </div>
      <button class="profile__addbutton link" type="button">
      </button>
    </section>
    <section class="elements">
      <article class="element">
        <img class="element__photo" src="./images/1.Royal-Botanical-Gardens-of-Peradeniya_Kandy_Sri-Lanka-2-min.jpg"
          alt="фотография алоказий из ботанического сада, Шри-ланка">
        <div class="element__content">
          <h2 class="element__text">Sri-Lanka, alocasia</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/2.United-Kingdom-min.jpg"
          alt="фотография соцветия и коробочек мака, Великобритания">
        <div class="element__content">
          <h2 class="element__text">UK, papaver</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/3.Denver_United-States.jpg" alt="фотография кувшинок, США">
        <div class="element__content">
          <h2 class="element__text">Denver, nymphaea</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/4.New-Forest-National-Park_UK.jpg"
          alt="фотография нефролепсиса и лошади в национальном парке, Великобритании">
        <div class="element__content">
          <h2 class="element__text">New-Forest, nephrolepis and horse</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/5.Santa-Maria.jpg" alt="фотография каладиумов, Санта-Мария">
        <div class="element__content">
          <h2 class="element__text">Campania, caladium</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
      <article class="element">
        <img class="element__photo" src="./images/6.Cairns-Botanic-Gardens_Cairns_Australia-min.jpg"
          alt="фотография бегонии в ботаническом саду, Австралия">
        <div class="element__content">
          <h2 class="element__text">Cairns, begonia</h2>
          <button class="element__button link" type="button">
          </button>
        </div>
      </article>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2022 Mesto Russia</p>
  </footer>
  <section class="popup">
    <div class="popup__container">
      <button class="popup__closebutton link" type="button">
      </button>
      <h2 class="popup__title">Редактировать профиль</h2>
      <form class="popup__editprofile" name="editprofile">
        <label class="popup__editform">
          <input class="popup__editform-name" type="text" name="name" placeholder="Имя" value="Жак-Ив Кусто">
        </label>
        <label class="popup__editform">
          <input class="popup__editform-about" type="text" name="about"
            placeholder="О себе" value="Исследователь океана">
        </label>
        <button class="popup__savebutton link" type="submit">Сохранить</button>
      </form>
    </div>
  </section>
  <script src="./scripts/index.js"></script>
</body>

</html>
