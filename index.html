<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mesto">
  <meta name="keywords" content="интерактивный альбом, выложить фото, оценить фото, путешествия">
  <meta name="author" content="Юлия Бондаренко">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Сервис Место</title>
</head>

<body class="page">
  <header class="header">
    <img class="header__logo" src="./images/headerlogo.svg" alt="логотип сервиса место">
  </header>

  <main class="content">

    <section class="profile">
      <div class="profile__content">
        <img class="profile__avatar" src="./images/avatar.jpg" alt="изображение аватара пользователя">
        <div class="profile__info">
          <div class="profile__title">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button class="profile__editbutton link" type="button">
            </button>
          </div>
          <p class="profile__about">Исследователь океана</p>
        </div>
      </div>
      <button class="profile__addbutton link" type="button">
      </button>
    </section>

    <section class="album">
      <div class="album__elements">
        <div class="element">
          <img class="element__photo" src="./images/1.NY.jpg" alt="фотография каладиума, Нью-Йорк">
          <button class="element__button-delete" type="button"></button>
          <div class="element__content">
            <h2 class="element__text">NY, caladium</h2>
            <button class="element__button link" type="button" name="like-button">
            </button>
          </div>
        </div>
        <div class="element">
          <img class="element__photo" src="./images/2.Altai-Republic.jpg" alt="фотография георгинов, Алтайский край">
          <button class="element__button-delete"></button>
          <div class="element__content">
            <h2 class="element__text">Altai Republic, dahlia</h2>
            <button class="element__button link" type="button" name="like-button">
            </button>
          </div>
        </div>
        <div class="element">
          <img class="element__photo" src="./images/3.New-Forest-National-Park_UK.jpg"
            alt="фотография нефролепсиса и лошади в национальном парке, Великобритании">
          <button class="element__button-delete"></button>
          <div class="element__content">
            <h2 class="element__text">UK New-Forest, nephrolepis and horse</h2>
            <button class="element__button link" type="button">
            </button>
          </div>
        </div>
        <div class="element">
          <img class="element__photo" src="./images/4.Royal-Botanical-Gardens-of-Peradeniya_Kandy_Sri-Lanka.jpg"
            alt="фотография алоказий из ботанического сада, Шри-ланка">
          <button class="element__button-delete"></button>
          <div class="element__content">
            <h2 class="element__text">Sri-Lanka, alocasia</h2>
            <button class="element__button link" type="button">
            </button>
          </div>
        </div>
        <div class="element">
          <img class="element__photo" src="./images/5.Vietnam.jpg" alt="фотография кувшинок, Вьетнам">
          <button class="element__button-delete"></button>
          <div class="element__content">
            <h2 class="element__text">Vietnam, nymphaea</h2>
            <button class="element__button link" type="button">
            </button>
          </div>
        </div>
        <div class="element">
          <img class="element__photo" src="./images/6.Detroit.jpg" alt="фотография мака, Детроит">
          <button class="element__button-delete"></button>
          <div class="element__content">
            <h2 class="element__text">Detroit, papaver</h2>
            <button class="element__button link" type="button">
            </button>
          </div>
        </div>
      </div>
    </section>

  </main>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2022 Mesto Russia</p>
  </footer>

  <!-- Окно редактирования профиля -->
  <section class="popup">
    <div class="popup__container">
      <button class="popup__closebutton link" type="button">
      </button>
      <h2 class="popup__title">Редактировать профиль</h2>
      <form class="popup__editprofile" name="editprofile">
        <label class="popup__editform">
          <input class="popup__input popup__input_type_name" type="text" name="name" placeholder="Имя"
            value="Жак-Ив Кусто">
        </label>
        <label class="popup__editform">
          <input class="popup__input popup__input_type_about" type="text" name="about" placeholder="О себе"
            value="Исследователь океана">
        </label>
        <button class="popup__savebutton link" type="submit">Сохранить</button>
      </form>
    </div>
  </section>
  <!-- Окно редактирования профиля -->

  <!-- Окно добавления фотокарточки -->
  <section class="popup popup-addphoto">
    <div class="popup__container popup__container-addphoto">
      <button class="popup__closebutton popup__closebutton-addphoto link" type="button">
      </button>
      <h2 class="popup__title popup__title-addphoto">Новое место</h2>
      <form class="popup__editprofile popup__editprofile-addphoto" name="editprofile">
        <label class="popup__editform popup__editform-addphoto">
          <input class="popup__input popup__input-addphoto_type_title" type="text" name="title" placeholder="Название">
        </label>
        <label class="popup__editform popup__editform-addphoto">
          <input class="popup__input popup__input-addphoto_type_link" type="text" name="link"
            placeholder="Ссылка на картинку">
        </label>
        <button class="popup__savebutton popup__savebutton-addphoto link" type="submit">Создать</button>
      </form>
    </div>
  </section>
  <!-- Окно добавления фотокарточки -->

  <script src="./scripts/index.js"></script>
</body>

</html>
