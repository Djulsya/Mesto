<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mesto">
  <meta name="keywords" content=" ">
  <meta name="author" content="Юлия Бондаренко">
  <link rel="stylesheet" href="./style.css">
  <title>Сервис Место</title>
</head>

<body class="body">
  <header class="header">
    <img class="header__logo" src="./images/header__logo.svg" alt="логотип сервиса место">
    <img class="header__borderline" src="./images/line.jpg">
  </header>
  <main class="content">
    <section class="profile">
      <img class="profile__avatar" src="./images/avatar.jpg" alt="изображение аватара пользователя">
      <div>
        <h1 class="profile__info profile__info_name">Жак-Ив Кусто</h1>
        <p class="profile__info profile__info_about">Исследователь океана</p>
        
          <button class="button">
            <img class="profile__editbutton" src="./images/editbutton.svg"
              alt="кнопка редактирования личной информации профиля">
          </button>
        
      </div>
      
        <button class="button">
          <img class="profile__addbutton" src="./images/addbutton-1.svg" alt="кнопка добавления нового фото в аккаунт">
        </button>
      
    </section>
    <section class="elements">
      <article class="element">
        <img class="element__photo" src="./images/1. Royal-Botanical-Gardens-of-Peradeniya_Kandy_Sri-Lanka.jpg">
        <p class="element__text">Sri-Lanka, alocasia</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
      <article class="element">
        <img class="element__photo" src="./images/2. United-Kingdom-min.jpg">
        <p class="element__text">UK, papaver</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
      <article class="element">
        <img class="element__photo" src="./images/3. Denver_United-States.jpg">
        <p class="element__text">Denver, nymphaea</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
      <article class="element">
        <img class="element__photo" src="./images/4. New-Forest-National-Park_UK.jpg">
        <p class="element__text">New-Forest, nephrolepis and horse</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
      <article class="element">
        <img class="element__photo" src="./images/5. Santa-Maria.jpg">
        <p class="element__text">Campania, caladium</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
      <article class="element">
        <img class="element__photo" src="./images/6. Cairns-Botanic-Gardens_Cairns_Australia-min.jpg">
        <p class="element__text">Cairns, begonia</p>
        
          <button>
            <img class="element__like" src="./images/like.svg">
          </button>
        
      </article>
    </section>
  </main>
  <footer class="footer">
    <h2 class="footer__copyright">&copy; 2022 Mesto Russia</h2>
  </footer>
</body>

</html>
